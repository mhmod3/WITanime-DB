name: Witanime Scheduler

on:
  schedule:
    - cron: '0 0 * * *'   # المهمة الأولى: كل 24 ساعة عند منتصف الليل (UTC)
    - cron: '0 * * * *'   # المهمة الثانية: كل ساعة عند الدقيقة 0
  workflow_dispatch:       # يسمح بالتشغيل اليدوي من تبويب Actions

jobs:
  run-script:
    runs-on: ubuntu-latest
    timeout-minutes: 350   # أقل من حد الـ 6 ساعات
    
    steps:
      - name: استنساخ الكود من المستودع
        uses: actions/checkout@v4
        
      - name: إعداد بيئة Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: تثبيت المكتبات المطلوبة
        run: |
          pip install cloudscraper beautifulsoup4 requests urllib3 schedule
          
      - name: تشغيل السكريبت الرئيسي
        env:
          WITANIME_TOKEN: ${{ secrets.WITANIME_TOKEN }}
          WITANIME_REPO: ${{ secrets.WITANIME_REPO }}
        run: python main.py
